<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محرك بحث قصة عشق - عالم الدراما</title>

<script async src="https://cse.google.com/cse.js?cx=40e25356b431744b1"></script>

<style>
body{
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0b0b0b;
    font-family:sans-serif;
    color:white;
    overflow:hidden;
}

.main-wrapper{
    text-align:center;
    width:90%;
    max-width:600px;
}

/* تحسين احترافي للشعار */
.logo-section{
    margin-bottom:40px;
    animation:fadeIn 1.2s ease forwards;
}

.logo-section img{
    width:340px;
    max-width:90%;
    border-radius:20px;
    transition:0.4s ease;
    filter:
        drop-shadow(0 0 25px rgba(229,9,20,0.4))
        drop-shadow(0 0 60px rgba(229,9,20,0.2));
}

.logo-section img:hover{
    transform:scale(1.05);
    filter:
        drop-shadow(0 0 35px rgba(229,9,20,0.7))
        drop-shadow(0 0 80px rgba(229,9,20,0.4));
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}

/* صندوق البحث */
.search-box-container{
    position:relative;
    width:100%;
}

.custom-bar{
    display:flex;
    align-items:center;
    background:#1a1a1a;
    border-radius:50px;
    padding:6px 10px;
    border:1px solid #333;
    transition:0.3s ease;
}

.custom-bar:focus-within{
    border-color:#e50914;
    box-shadow:0 0 15px rgba(229,9,20,0.5);
}

input#mainSearch{
    flex:1;
    background:transparent;
    border:none;
    padding:12px 20px;
    color:white;
    font-size:18px;
    outline:none;
    text-align:right;
}

.btn-search{
    background:#e50914;
    border:none;
    color:white;
    padding:10px 25px;
    border-radius:40px;
    cursor:pointer;
    font-weight:bold;
    font-size:15px;
    transition:0.2s;
}

.btn-search:hover{
    background:#ff121d;
}

#sugBox{
    position:absolute;
    top:110%;
    left:0;
    right:0;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:15px;
    display:none;
    z-index:1000;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.7);
}

.sug-item{
    padding:12px 20px;
    text-align:right;
    cursor:pointer;
    border-bottom:1px solid #222;
    color:#bbb;
    font-size:15px;
}

.sug-item:hover{
    background:#e50914;
    color:white;
}

/* النص السفلي */
.footer-text{
    margin-top:35px;
    color:#888;
    font-size:20px;
    font-weight:500;
}

.footer-text span{
    color:#e50914;
    font-weight:bold;
    font-size:22px;
}
</style>
</head>

<body>

<div class="main-wrapper">

<div class="logo-section">
    <img src="قصة-عشق.webp" alt="قصة عشق">
</div>

<div class="search-box-container">
    <div class="custom-bar">
        <input type="text" id="mainSearch" placeholder="ابحث عن مسلسلك المفضل..." autocomplete="off">
        <button class="btn-search" id="execSearch">بحث</button>
    </div>
    <div id="sugBox"></div>
</div>

<div class="footer-text">
    محرك بحث ذكي مخصص لموقع <span>قصة عشق</span>
</div>

</div>

<script>
const sInput=document.getElementById('mainSearch');
const sBox=document.getElementById('sugBox');
const sBtn=document.getElementById('execSearch');
let debounceTimer;

function startSearch(val){
    if(val.trim()!==""){
        // تعديل رابط التوجيه لموقع قصة عشق الجديد
        window.location.href=`https://far.q-ask.video/?s=${encodeURIComponent(val)}`;
    }
}

sBtn.onclick=()=>startSearch(sInput.value);

sInput.addEventListener("keydown",function(e){
    if(e.key==="Enter") startSearch(this.value);
    if(e.key==="Escape") sBox.style.display="none";
});

sInput.addEventListener("input",function(){
    clearTimeout(debounceTimer);
    const q=this.value.trim();
    if(q.length<2){
        sBox.style.display="none";
        return;
    }
    debounceTimer=setTimeout(()=>{fetchSuggestions(q);},300);
});

function fetchSuggestions(query){
    const script=document.createElement("script");
    // جلب الاقتراحات مع التركيز على نتائج موقع قصة عشق
    script.src=`https://suggestqueries.google.com/complete/search?client=chrome&q=site:far.q-ask.video ${encodeURIComponent(query)}&callback=googleSuggest`;
    document.body.appendChild(script);
    document.body.removeChild(script);
}

window.googleSuggest=function(data){
    const suggestions=data[1];
    sBox.innerHTML="";
    if(suggestions.length===0){
        sBox.style.display="none";
        return;
    }
    suggestions.slice(0,6).forEach(text=>{
        // تنظيف النص المقترح من رابط الموقع ليظهر اسم المسلسل فقط
        const cleanText = text.replace('site:far.q-ask.video', '').trim();
        const div=document.createElement("div");
        div.className="sug-item";
        div.textContent=cleanText;
        div.onclick=()=>{
            sInput.value=cleanText;
            startSearch(cleanText);
        };
        sBox.appendChild(div);
    });
    sBox.style.display="block";
};

document.addEventListener("click",function(e){
    if(!e.target.closest(".search-box-container")){
        sBox.style.display="none";
    }
});
</script>

</body>
</html>
