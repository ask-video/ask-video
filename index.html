<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محرك بحث قصة عشق</title>

<script async src="https://cse.google.com/cse.js?cx=40e25356b431744b1"></script>

<style>
body{
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#eeeeee;
    font-family:sans-serif;
}

.main-wrapper{
    text-align:center;
    width:90%;
    max-width:700px;
}

/* 🔥 دمج الشعار احترافي */
.logo-section{
    position:relative;
    display:inline-block;
    margin-bottom:20px;
}

/* هالة خلف الشعار */
.logo-section::before{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:240px;
    height:130px;
    background:radial-gradient(circle, rgba(229,9,20,0.25) 0%, transparent 70%);
    filter:blur(30px);
    z-index:0;
}

/* الشعار نفسه */
.logo-section img{
    position:relative;
    width:140px;
    z-index:1;

    /* 🔥 دمج مع الخلفية */
    mix-blend-mode:multiply;

    /* تقليل وضوح الخلفية */
    opacity:0.92;

    filter:
        brightness(1.1)
        contrast(1.1)
        drop-shadow(0 0 15px rgba(229,9,20,0.5));

    transition:0.4s ease;
}

.logo-section img:hover{
    transform:scale(1.05);
    filter:
        brightness(1.2)
        contrast(1.2)
        drop-shadow(0 0 25px rgba(229,9,20,0.8));
}

/* العنوان */
.title{
    font-size:36px;
    margin-bottom:30px;
    font-weight:bold;
}

.title span{
    color:#e50914;
}

/* البحث */
.search-box{
    display:flex;
    border:2px solid #ccc;
    border-radius:6px;
    overflow:hidden;
    background:white;
}

.search-box input{
    flex:1;
    padding:15px;
    font-size:18px;
    border:none;
    outline:none;
    text-align:right;
}

.search-btn{
    background:#e50914;
    color:white;
    border:none;
    padding:0 25px;
    font-size:20px;
    cursor:pointer;
}

.search-btn:hover{
    background:#c40812;
}

/* النص السفلي */
.sub-text{
    margin-top:25px;
    font-size:20px;
    color:#555;
}

.sub-text span{
    color:#2b6ca3;
}
</style>
</head>

<body>

<div class="main-wrapper">

<div class="logo-section">
    <img src="logo.png" alt="قصة عشق">
</div>

<div class="title">
    محرك بحث <span>قصة عشق</span>
</div>

<div class="search-box">
    <input type="text" id="mainSearch" placeholder="ابحث عن مسلسلك المفضل...">
    <button class="search-btn" id="execSearch">🔍</button>
</div>

<div class="sub-text">
    أفضل محركات البحث لجميع <span>المسلسلات و الافلام التركية</span>
</div>

</div>

<script>
const sInput=document.getElementById('mainSearch');
const sBtn=document.getElementById('execSearch');

function startSearch(val){
    if(val.trim()!==""){
        window.location.href=`https://far.q-ask.video/?s=${encodeURIComponent(val)}`;
    }
}

sBtn.onclick=()=>startSearch(sInput.value);

sInput.addEventListener("keydown",function(e){
    if(e.key==="Enter") startSearch(this.value);
});
</script>

</body>
</html>
