<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محرك بحث قصة عشق</title>

<script async src="https://cse.google.com/cse.js?cx=40e25356b431744b1"></script>

<style>
body{
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#eeeeee;
    font-family:sans-serif;
}

.main-wrapper{
    text-align:center;
    width:90%;
    max-width:700px;
}

.logo-section img{
    width:160px;
    margin-bottom:20px;
}

.title{
    font-size:36px;
    margin-bottom:30px;
    font-weight:bold;
}

.title span{
    color:#e50914;
}

.search-box{
    display:flex;
    border:2px solid #ccc;
    border-radius:6px;
    overflow:hidden;
    background:white;
}

.search-box input{
    flex:1;
    padding:15px;
    font-size:18px;
    border:none;
    outline:none;
    text-align:right;
}

.search-btn{
    background:#e50914;
    color:white;
    border:none;
    padding:0 25px;
    font-size:20px;
    cursor:pointer;
}

.search-btn:hover{
    background:#c40812;
}

.sub-text{
    margin-top:25px;
    font-size:20px;
    color:#555;
}

.sub-text span{
    color:#2b6ca3;
}
</style>
</head>

<body>

<div class="main-wrapper">

<div class="logo-section">
    <img src="قصة-عشق.webp" alt="قصة عشق">
</div>

<div class="title">
    محرك بحث <span>قصة عشق</span>
</div>

<div class="search-box">
    <input type="text" id="mainSearch" placeholder="ابحث عن مسلسلك المفضل...">
    <button class="search-btn" id="execSearch">🔍</button>
</div>

<div class="sub-text">
    أفضل محركات البحث لجميع <span>المسلسلات و الافلام التركية</span>
</div>

</div>

<script>
const sInput=document.getElementById('mainSearch');
const sBtn=document.getElementById('execSearch');

function startSearch(val){
    if(val.trim()!==""){
        window.location.href=`https://far.q-ask.video/?s=${encodeURIComponent(val)}`;
    }
}

sBtn.onclick=()=>startSearch(sInput.value);

sInput.addEventListener("keydown",function(e){
    if(e.key==="Enter") startSearch(this.value);
});
</script>

</body>
</html>
