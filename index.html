<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محرك بحث قصة عشق</title>

<script async src="https://cse.google.com/cse.js?cx=40e25356b431744b1"></script>

<style>
body{
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0b0b0b;
    font-family:sans-serif;
    color:white;
}

.main-wrapper{
    text-align:center;
    width:90%;
    max-width:800px;
}

/* 🔥 الشعار (تم تكبيره) */
.logo-section img{
    width:220px; /* 🔥 كان صغير - الآن أكبر */
    margin-bottom:25px;

    filter:
        drop-shadow(0 0 30px rgba(229,9,20,0.7))
        drop-shadow(0 0 80px rgba(229,9,20,0.4));

    transition:0.4s;
}

.logo-section img:hover{
    transform:scale(1.05);
}

/* العنوان */
.title{
    font-size:42px;
    margin-bottom:35px;
    font-weight:bold;
}

.title span{
    color:#e50914;
}

/* البحث */
.search-box{
    display:flex;
    border:1px solid #333;
    border-radius:60px;
    overflow:hidden;
    background:#1a1a1a;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.search-box input{
    flex:1;
    padding:18px 25px;
    font-size:20px;
    border:none;
    outline:none;
    background:transparent;
    color:white;
    text-align:right;
}

.search-box input::placeholder{
    color:#888;
}

/* زر البحث */
.search-btn{
    background:#e50914;
    color:white;
    border:none;
    padding:0 30px;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
}

.search-btn:hover{
    background:#ff1a1a;
    box-shadow:0 0 20px rgba(229,9,20,0.8);
}

/* 🔥 النص الجديد */
.sub-text{
    margin-top:35px;
    font-size:22px;
    color:#aaa;
}

.sub-text span{
    color:#4ea1ff;
}
</style>
</head>

<body>

<div class="main-wrapper">

<div class="logo-section">
    <img src="قصة-عشق.webp" alt="قصة عشق">
</div>

<div class="title">
    محرك بحث <span>قصة عشق</span>
</div>

<div class="search-box">
    <input type="text" id="mainSearch" placeholder="ابحث عن مسلسلك المفضل...">
    <button class="search-btn" id="execSearch">🔍</button>
</div>

<div class="sub-text">
    استمتع بمشاهدة أحدث <span>المسلسلات التركية</span> على قصة عشق
</div>

</div>

<script>
const sInput=document.getElementById('mainSearch');
const sBtn=document.getElementById('execSearch');

function startSearch(val){
    if(val.trim()!==""){
        window.location.href=`https://far.q-ask.video/?s=${encodeURIComponent(val)}`;
    }
}

sBtn.onclick=()=>startSearch(sInput.value);

sInput.addEventListener("keydown",function(e){
    if(e.key==="Enter") startSearch(this.value);
});
</script>

</body>
</html>
